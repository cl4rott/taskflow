<ion-content class="cadastro-page">
  <div class="container">

    <h1>TaskFlow</h1>
    <p>Criar conta</p>

    <ion-item lines="none">
      <ion-input placeholder="Nome"></ion-input>
    </ion-item>

    <ion-item lines="none">
      <ion-input type="email" placeholder="Email"></ion-input>
    </ion-item>

    <ion-item lines="none">
      <ion-input type="password" placeholder="Senha"></ion-input>
    </ion-item>

    <ion-item lines="none">
      <ion-input type="password" placeholder="Confirmar senha"></ion-input>
    </ion-item>

    <ion-button expand="block" class="btn-cadastro">
      Cadastrar
    </ion-button>

    <p class="link">Já possui conta?</p>
    <a class="link" href="/login">Fazer login</a>

  </div>
</ion-content>
